<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Importar reparaciones — Cuper SRL</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<style>
  body{ font-family:'Segoe UI',sans-serif; background:#16181a; color:#eef1ee; padding:40px; max-width:640px; margin:0 auto; }
  h1{ color:#47b27a; font-size:20px; }
  input{
    width:100%; background:#232924; border:1px solid #313a33; color:#eef1ee;
    padding:10px 12px; border-radius:5px; font-size:14px; margin-bottom:10px;
  }
  button{
    background:#47b27a; color:#0f1211; border:none; padding:12px 22px;
    border-radius:6px; font-weight:700; cursor:pointer; font-size:14px; margin-top:6px;
  }
  button:disabled{ background:#313a33; color:#90998f; cursor:not-allowed; }
  #log{
    margin-top:20px; background:#1c211e; border:1px solid #313a33; border-radius:6px;
    padding:14px 16px; font-family:'JetBrains Mono',monospace; font-size:13px; white-space:pre-line;
    max-height:340px; overflow-y:auto;
  }
  .warn{ color:#e2574c; }
  .ok{ color:#47b27a; }
  #loginBox{ background:#1c211e; border:1px solid #313a33; border-radius:8px; padding:22px; margin-top:20px; }
  #importBox{ display:none; }
</style>
</head>
<body>
  <h1>🔧 Importar historial de reparaciones</h1>
  <p>Esto carga <span id="totalReg"></span> reparaciones (repuestos + mano de obra por dominio) en la colección <code>reparaciones</code>.
  Usa el número de Orden como clave, así que no duplica datos si lo corrés de nuevo.</p>

  <div id="loginBox">
    <label>Usuario</label>
    <input type="text" id="loginUser" placeholder="admin">
    <label>Contraseña</label>
    <input type="password" id="loginPass" placeholder="••••••••">
    <button id="btnLogin">Ingresar</button>
    <div id="loginMsg" style="margin-top:10px; font-size:13px;"></div>
  </div>

  <div id="importBox">
    <button id="btnImport">Importar reparaciones</button>
    <div id="log"></div>
  </div>

  <script src="firebase-config.js"></script>
  <script src="reparaciones-data.js"></script>
  <script>
    document.getElementById('totalReg').textContent = REPARACIONES.length;

    const loginBox = document.getElementById('loginBox');
    const importBox = document.getElementById('importBox');
    const loginMsg = document.getElementById('loginMsg');

    document.getElementById('btnLogin').addEventListener('click', async () => {
      const u = document.getElementById('loginUser').value.trim().toLowerCase();
      const p = document.getElementById('loginPass').value;
      const email = u.includes('@') ? u : u + '@cupersrl.local';
      loginMsg.textContent = 'Ingresando...';
      loginMsg.style.color = '#90998f';
      try {
        await firebase.auth().signInWithEmailAndPassword(email, p);
      } catch (err) {
        loginMsg.textContent = 'Usuario o contraseña incorrectos.';
        loginMsg.style.color = '#e2574c';
      }
    });

    firebase.auth().onAuthStateChanged((user) => {
      if (user) {
        loginBox.style.display = 'none';
        importBox.style.display = 'block';
      } else {
        loginBox.style.display = 'block';
        importBox.style.display = 'none';
      }
    });

    const logEl = document.getElementById('log');
    const btn = document.getElementById('btnImport');
    function log(msg, cls){
      const line = document.createElement('div');
      if (cls) line.className = cls;
      line.textContent = msg;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
    }

    btn.addEventListener('click', async () => {
      btn.disabled = true;
      log(`Total a importar: ${REPARACIONES.length} registros`);
      const BATCH_SIZE = 400;
      let done = 0;
      try {
        for (let i = 0; i < REPARACIONES.length; i += BATCH_SIZE) {
          const chunk = REPARACIONES.slice(i, i + BATCH_SIZE);
          const batch = db.batch();
          chunk.forEach(rec => {
            const ref = db.collection('reparaciones').doc(rec.orden);
            batch.set(ref, { ...rec, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
          });
          await batch.commit();
          done += chunk.length;
          log(`Importados ${done} / ${REPARACIONES.length}...`);
        }
        log('✔ Importación completa.', 'ok');
        log('Ya podés buscar por dominio en la app.', 'ok');
      } catch (err) {
        log('Error: ' + err.message, 'warn');
        log('Revisá que firebase-config.js tenga tus datos reales, que hayas iniciado sesión, y que las reglas de Firestore permitan escritura en "reparaciones".', 'warn');
      }
      btn.disabled = false;
    });
  </script>
</body>
</html>
